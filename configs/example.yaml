# Market-Aware Buyback Engine Configuration
#
# This file configures the MAB engine. All decimal values are represented as
# quoted strings so that yaml.v3 passes them through shopspring/decimal without
# floating-point rounding.

# ── Asset pair ────────────────────────────────────────────────────────────────
# token:        The asset to buy back.
# coingecko_id: CoinGecko coin ID for market data (required).
#               Find your token's ID at https://www.coingecko.com/en/api/documentation
# quote_asset:  The asset used to pay for buybacks.
token: "AAVE"
coingecko_id: "aave"
quote_asset: "USDC"

# ── Budget ────────────────────────────────────────────────────────────────────
# annual_budget_usd: Total annual buyback budget in USD. The engine divides
#                    this by 365 to derive a daily base budget.
annual_budget_usd: "50000000"

# ── Regime multipliers ───────────────────────────────────────────────────────
# regime_multipliers maps each Wyckoff market regime to a spending-rate range.
#   - accumulation: prices are low; spend more aggressively (1.5x–2.0x base).
#   - markup:       prices are rising; pull back (0.3x–0.5x).
#   - distribution: prices are high; spend very little (0.0x–0.2x).
#   - markdown:     prices are falling; spend moderately (0.8x–1.0x).
regime_multipliers:
  accumulation:
    min: "1.5"
    max: "2.0"
  markup:
    min: "0.3"
    max: "0.5"
  distribution:
    min: "0.0"
    max: "0.2"
  markdown:
    min: "0.8"
    max: "1.0"

# ── VWAP discount targeting ──────────────────────────────────────────────────
# base_discount:      Target discount below the 30-day VWAP (0.02 = 2%).
# vol_scaling_factor: How much realized volatility widens the discount. Higher
#                     values make the engine more patient during volatile markets.
base_discount: "0.02"
vol_scaling_factor: "0.1"

# ── Execution parameters ─────────────────────────────────────────────────────
# max_slippage_bps:  Maximum acceptable slippage in basis points (200 = 2%).
# order_split_count: Number of sub-orders per daily execution cycle. Splitting
#                    orders reduces market impact.
# execution_jitter:  Randomness factor (0.0–1.0) applied to sub-order timing to
#                    reduce predictability and front-running risk.
# min_execution_size: Smallest order size in USD. Sub-orders below this
#                     threshold are skipped to avoid dust trades.
max_slippage_bps: 200
order_split_count: 3
execution_jitter: 0.3
min_execution_size: "1000"

# ── Exchange preferences ─────────────────────────────────────────────────────
# prefer_batch_auction:      When true, the router prefers batch-auction venues
#                            (e.g., CoW Protocol) for MEV protection.
# exchange_weight_overrides: Manual overrides to bias routing toward or away
#                            from specific exchanges. Keys are exchange names;
#                            values are weight multipliers (1.0 = neutral).
prefer_batch_auction: true
exchange_weight_overrides: {}

# ── Database ──────────────────────────────────────────────────────────────────
# db_path: File path for the SQLite database that persists fills, cycle
#          summaries, and other engine state.
db_path: "./buyback.db"
